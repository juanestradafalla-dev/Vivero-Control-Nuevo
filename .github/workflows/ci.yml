name: Validación técnica

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  contracts:
    name: Contratos compartidos
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: contracts/package-lock.json
      - run: npm ci
      - run: npm run validate
      - run: npm test

  android:
    name: Vivero Campo
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/campo-android
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-java@v5.5.0
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v4.0.1
      - name: Instalar SDK Android 36.1
        run: sdkmanager "platforms;android-36.1" "build-tools;36.1.0"
      - uses: gradle/actions/setup-gradle@v6.2.0
      - run: chmod +x gradlew
      - run: ./gradlew assembleDebug
      - name: Compilar production sin firma y con identificadores ficticios
        run: >-
          ./gradlew assembleRelease --no-configuration-cache
          -PproductionFirebaseProjectId=viverocontrol-3f83f
          -PproductionFirebaseApiKey=API_KEY_FICTICIA_SOLO_CI
          -PproductionFirebaseAppId=1:000000000000:android:app-ficticia-solo-ci
      - run: ./gradlew testDebugUnitTest
      - run: ./gradlew lintDebug

  maestro:
    name: Vivero Maestro
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/maestro-desktop
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/maestro-desktop/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high

  backend:
    name: Backend y reglas
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/functions
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-java@v5.5.0
        with:
          distribution: temurin
          java-version: 21
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/functions/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Probar Auth, Firestore, Functions, reglas y concurrencia
        run: npm run test:emulators
      - run: npm audit --omit=dev --audit-level=high

  repository-audit:
    name: Secretos y artefactos prohibidos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Rechazar secretos, binarios y directorios generados
        shell: bash
        run: |
          set -euo pipefail
          forbidden_files="$(find . -type f \( -name 'google-services.json' -o -name '*.apk' -o -name '*.aab' -o -name '*.exe' -o -name '*.msi' -o -name '*.keystore' -o -name '*.jks' -o -name '*.p12' -o -name '*.pfx' -o -name '.env' -o -name '.env.local' -o -name '.env.viverocontrol*' -o -name '*.migration.private.json' \) -print)"
          forbidden_dirs="$(find . -type d \( -name node_modules -o -name build -o -name .gradle -o -name .idea -o -name .private \) -not -path './.git/*' -print)"
          tracked_private="$(git ls-files '.private/**')"
          migration_packages="$(find . -type f -name 'paquete-migracion-catalogo-*.json' -not -path './data/templates/*.example.json' -print)"
          test -z "$forbidden_files"
          test -z "$forbidden_dirs"
          test -z "$tracked_private"
          test -z "$migration_packages"
          ! git grep -n -E -- 'AIza[0-9A-Za-z_-]{35}|-----BEGIN (PRIVATE KEY|CERTIFICATE)' ':!**/package-lock.json'
          ! git grep -n -E -- 'firebase[[:space:]]+deploy' ':!.github/workflows/ci.yml' ':!docs/**' ':!README.md'
          email_hits="$(git grep -h -I -o -E -- '[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}' ':!**/package-lock.json' || true)"
          unexpected_emails="$(printf '%s\n' "$email_hits" | sed '/^$/d' | grep -E -vi '@prueba\.local$|@[A-Za-z0-9.-]+\.invalid$|@[A-Za-z0-9.-]+\.test$' || true)"
          test -z "$unexpected_emails"
          app_id_hits="$(git grep -h -I -o -E -- '1:[0-9]{6,}:(android|web|ios):[0-9A-Za-z._-]+' ':!**/package-lock.json' || true)"
          unexpected_app_ids="$(printf '%s\n' "$app_id_hits" | sed '/^$/d' | grep -E -v '000000000000|1234567890|ficticia|demo' || true)"
          test -z "$unexpected_app_ids"
