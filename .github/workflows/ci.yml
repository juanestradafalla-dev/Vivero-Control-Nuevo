name: Validación técnica

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  contracts:
    name: Contratos compartidos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node contracts/validate.mjs

  android:
    name: Vivero Campo
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/campo-android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - name: Instalar SDK Android 36.1
        run: sdkmanager "platforms;android-36.1" "build-tools;36.1.0"
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - run: ./gradlew assembleDebug
      - run: ./gradlew testDebugUnitTest
      - run: ./gradlew lintDebug

  maestro:
    name: Vivero Maestro
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/maestro-desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/maestro-desktop/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  backend:
    name: Backend y reglas
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/functions/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run test:rules:emulator
